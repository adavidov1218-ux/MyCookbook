name: mycookbook_gemini
description: "A new Flutter project based on MyCookbook, enhanced for robustness and user experience."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Local database
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Image handling
  image_picker: ^1.1.2

  # OCR
  google_mlkit_text_recognition: ^0.13.1

  # HTTP client for future sync
  http: ^1.2.2

  # UUID generation
  uuid: ^4.5.1
  equatable: ^2.0.7

  # JSON serialization
  json_annotation: ^4.9.0
  youtube_explode_dart: ^3.0.5
  googleapis: ^13.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  drift_dev: ^2.20.3
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
