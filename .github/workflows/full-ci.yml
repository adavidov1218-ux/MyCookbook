name: Full CI - Complete Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]

jobs:
  parser-tests:
    name: RecipeParser Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Run parser tests
        run: flutter test test/parser/ -v
        continue-on-error: false

  full-test-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: parser-tests

    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Run all tests
        run: flutter test test/ -v
        continue-on-error: false

  contract-validation:
    name: Parser Contract Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Verify PARSER_CONTRACT.md exists
        run: test -f lib/services/PARSER_CONTRACT.md || (echo "PARSER_CONTRACT.md missing!" && exit 1)

      - name: Verify AGENT_INSTRUCTIONS.md exists
        run: test -f lib/services/AGENT_INSTRUCTIONS.md || (echo "AGENT_INSTRUCTIONS.md missing!" && exit 1)

      - name: Verify golden_behavior_dataset.dart exists
        run: test -f test/parser/golden_behavior_dataset.dart || (echo "golden_behavior_dataset.dart missing!" && exit 1)

      - name: Verify golden_behavior_test.dart exists
        run: test -f test/parser/golden_behavior_test.dart || (echo "golden_behavior_test.dart missing!" && exit 1)

  status-check:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [ parser-tests, full-test-suite, contract-validation ]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.parser-tests.result }}" != "success" ]; then
            echo "❌ Parser tests FAILED"
            exit 1
          fi
          if [ "${{ needs.full-test-suite.result }}" != "success" ]; then
            echo "❌ Full test suite FAILED"
            exit 1
          fi
          if [ "${{ needs.contract-validation.result }}" != "success" ]; then
            echo "❌ Contract validation FAILED"
            exit 1
          fi
          echo "✅ All CI checks passed"
