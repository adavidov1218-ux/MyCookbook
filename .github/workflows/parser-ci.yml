name: RecipeParser CI - Enforce Golden Tests

on:
  push:
    branches: [ main, develop, ci-trigger-test ]  # TEMP: ci-trigger-test for workflow debug
    paths:
      - 'lib/services/recipe_parser.dart'
      - 'lib/services/normalizer.dart'
      - 'lib/services/comparer.dart'
      - 'test/parser/**'
      - '.github/workflows/parser-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'lib/services/recipe_parser.dart'
      - 'lib/services/normalizer.dart'
      - 'lib/services/comparer.dart'
      - 'test/parser/**'

jobs:
  parser-golden-tests:
    name: RecipeParser Golden Tests (BLOCKING)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Run golden behavior tests (MUST PASS)
        run: flutter test test/parser/golden_behavior_test.dart -v
        continue-on-error: false

      - name: Run parser unit tests
        run: flutter test test/parser/recipe_parser_test.dart -v
        continue-on-error: false

      - name: Run regression tests
        run: flutter test test/parser/recipe_parser_regression_test.dart -v
        continue-on-error: false

      - name: Run all parser tests
        run: flutter test test/parser/ -v
        continue-on-error: false

  full-test-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: parser-golden-tests

    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Run all tests
        run: flutter test test/ -v
        continue-on-error: false

  contract-validation:
    name: Parser Contract Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Verify PARSER_CONTRACT.md exists
        run: test -f lib/services/PARSER_CONTRACT.md || (echo "PARSER_CONTRACT.md missing!" && exit 1)

      - name: Verify AGENT_INSTRUCTIONS.md exists
        run: test -f lib/services/AGENT_INSTRUCTIONS.md || (echo "AGENT_INSTRUCTIONS.md missing!" && exit 1)

      - name: Verify golden_behavior_dataset.dart exists
        run: test -f test/parser/golden_behavior_dataset.dart || (echo "golden_behavior_dataset.dart missing!" && exit 1)

      - name: Verify golden_behavior_test.dart exists
        run: test -f test/parser/golden_behavior_test.dart || (echo "golden_behavior_test.dart missing!" && exit 1)

  enforce-contract:
    name: Enforce Parser Contract
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v3

      - name: Check for parser changes
        id: parser_changed
        run: |
          if git diff --name-only origin/main...HEAD | grep -E 'lib/services/recipe_parser\.dart|lib/services/normalizer\.dart|lib/services/comparer\.dart'; then
            echo "parser_changed=true" >> $GITHUB_OUTPUT
          else
            echo "parser_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate commit message for parser changes
        if: steps.parser_changed.outputs.parser_changed == 'true'
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qE '\[PARSER-FIX\]|golden.*test|semantic'; then
            echo "✅ Commit message valid for parser changes"
          else
            echo "❌ Parser changes require commit tag [PARSER-FIX] or reference to golden tests"
            exit 1
          fi

  status-check:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [ parser-golden-tests, full-test-suite, contract-validation ]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.parser-golden-tests.result }}" != "success" ]; then
            echo "❌ Golden tests FAILED - merge blocked"
            exit 1
          fi
          if [ "${{ needs.full-test-suite.result }}" != "success" ]; then
            echo "❌ Full test suite FAILED - merge blocked"
            exit 1
          fi
          if [ "${{ needs.contract-validation.result }}" != "success" ]; then
            echo "❌ Contract validation FAILED - merge blocked"
            exit 1
          fi
          echo "✅ All CI checks passed - merge allowed"
